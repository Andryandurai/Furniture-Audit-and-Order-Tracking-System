<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Furniture Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --wood:      #8B5E3C;
            --wood-dark: #5C3D1E;
            --cream:     #FAF6F0;
            --sand:      #EDE0CC;
            --sand-mid:  #D9C5A7;
            --charcoal:  #2C2417;
            --muted:     #7A6A55;
            --red:       #B83030;
            --red-lt:    #FDEAEA;
            --green:     #3A7D44;
            --green-lt:  #E6F4E9;
            --radius:    10px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--wood-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .login-card {
            background: var(--cream);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,.35);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-logo h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 2rem;
            color: var(--wood-dark);
        }
        .login-logo p { color: var(--muted); font-size: .88rem; margin-top: .3rem; }
        .form-group { margin-bottom: 1.1rem; }
        label { display: block; font-weight: 500; font-size: .88rem; color: var(--muted); margin-bottom: .4rem; }
        input[type=text], input[type=password] {
            width: 100%;
            padding: .65rem .9rem;
            border: 1.5px solid var(--sand-mid);
            border-radius: 8px;
            font-family: inherit;
            font-size: .95rem;
            background: #fff;
            color: var(--charcoal);
            outline: none;
            transition: border-color .15s;
        }
        input:focus { border-color: var(--wood); }
        .btn {
            width: 100%;
            padding: .7rem;
            background: var(--wood-dark);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .15s;
            margin-top: .5rem;
        }
        .btn:hover { opacity: .88; }
        .flash { padding: .7rem 1rem; border-radius: 8px; font-size: .88rem; font-weight: 500; border-left: 4px solid; margin-bottom: 1rem; }
        .flash.error { background: var(--red-lt); color: var(--red); border-color: var(--red); }
        .flash.success { background: var(--green-lt); color: var(--green); border-color: var(--green); }
        .hint { margin-top: 1.25rem; font-size: .8rem; color: var(--muted); text-align: center; background: var(--sand); border-radius: 8px; padding: .7rem; }
        .hint strong { color: var(--wood-dark); }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-logo">
        <div style="font-size:2.5rem; margin-bottom:.5rem;">🪑</div>
        <h1>FurnitureTracker</h1>
        <p>Order &amp; Audit Management System</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter username" autofocus required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn">Sign In →</button>
    </form>

    <div class="hint">
        <strong>Demo credentials:</strong><br>
        admin / admin123 &nbsp;|&nbsp; staff / staff123
    </div>
</div>
</body>
</html>
